#=========================================
# Package manager
#=========================================
[[plugins]]
repo = 'Shougo/dein.vim'

#=========================================
# Look and Feel
#=========================================
#------- Colorscheme ------- 
[[plugins]]
repo = 'morhetz/gruvbox'

[[plugins]]
repo = 'ghifarit53/tokyonight-vim'

#------- Statusline, BUfferline ------- 
[[plugins]]
repo = 'itchyny/lightline.vim'

[[plugins]]
repo = 'mengelbrecht/lightline-bufferline'

#------- Icons -------
[[plugins]]
repo = 'lambdalisue/nerdfont.vim'

[[plugins]]
repo = 'lambdalisue/glyph-palette.vim'

[[plugins]]
repo = 'lambdalisue/fern-renderer-nerdfont.vim'

#------- No category -------
[[plugins]]
repo = 'sheerun/vim-polyglot'

[[plugins]]
repo = 'junegunn/rainbow_parentheses.vim'

[[plugins]]
repo = 'nathanaelkane/vim-indent-guides'

[[plugins]]
repo = 'takeshid/colortips.vim'

#=========================================
# User Interface
#=========================================
#------- Filer -------
[[plugins]]
repo = 'lambdalisue/fern.vim'

#------- FuzzyFinder -------
[[plugins]]
repo = 'junegunn/fzf'

[[plugins]]
repo = 'junegunn/fzf.vim'
depends = ['junegunn/fzf']

#------- Git -------
[[plugins]]
repo = 'tpope/vim-fugitive'

[[plugins]]
repo = 'airblade/vim-gitgutter'

#=========================================
# AutoComplete and LanguageServer
#=========================================
#------- LSP -------
[[plugins]]
repo = 'prabirshrestha/vim-lsp'

[[plugins]]
repo = 'mattn/vim-lsp-settings'
depends = ['prabirshrestha/vim-lsp']

[[plugins]]
repo = 'prabirshrestha/async.vim'

#------- complete-------
[[plugins]]
repo = 'prabirshrestha/asyncomplete.vim'

[[plugins]]
repo = 'prabirshrestha/asyncomplete-lsp.vim'
depends = ['prabirshrestha/vim-lsp', 'prabirshrestha/asyncomplete.vim']

#------- symbol-viewer ------
[[plugins]]
repo = 'liuchengxu/vista.vim'
depends = ['prabirshrestha/vim-lsp']

#=========================================
# Misc
#=========================================
[[plugins]]
repo = 'tpope/vim-surround'

[[plugins]]
repo = 'tpope/vim-commentary'

[[plugins]]
repo = 'mattn/vim-maketable'

[[plugins]]
repo = 'dhruvasagar/vim-table-mode'

[[plugins]]
repo = 'vim-jp/vimdoc-ja'

[[plugins]]
repo = 'cohama/lexima.vim'

[[plugins]]
repo = 'osyo-manga/vim-anzu'

[[plugins]]
repo = 'thinca/vim-themis'

[[plugins]]
repo = 'glidenote/memolist.vim'

[[plugins]]
repo = 'fifi2/gtd.vim'

[[plugins]]
repo = 'vim-denops/denops.vim'

[[plugins]]
repo = 'vim-skk/skkeleton'
depends = ['vim-denops/denops.vim']


