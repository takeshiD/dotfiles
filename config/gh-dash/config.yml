prSections:
  - title: 󰅺 Needs Your Review
    filters: is:open -reviewed-by:@me review-requested:@me -author:@me
  - title: 󰅿 Reviewed
    filters: is:open reviewed-by:@me -review-requested:@me -author:@me
  - title:  My PR
    filters: is:open author:@me
  - title:  Re-Requested
    filters: is:open reviewed-by:@me review-requested:@me -author:@me
  - title:  Drafts
    filters: is:open is:draft review-requested:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: ctrl+n
      builtin: nextSection
    - key: ctrl+p
      builtin: prevSection
    - key: ctrl+j
      builtin: pageDown
    - key: ctrl+k
      builtin: pageUp
  prs:
    - key: tab
      builtin: nextSidebarTab
    - key: shift+tab
      builtin: prevSidebarTab
repoPaths: {}
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
