# mdpeek configuration file
#
# Location (XDG Base Directory compliant):
#   $XDG_CONFIG_HOME/mdpeek/config.toml
#   Falls back to ~/.config/mdpeek/config.toml when XDG_CONFIG_HOME is not set.
#
# Priority: CLI arguments > config file > built-in defaults

# Default mode when mdpeek is invoked with no subcommand.
# Accepted values: "serve" | "term"
default_mode = "serveterm"

[server]
# IP address to bind the preview server to.
host = "127.0.0.1"

# Port number to listen on.
port = "3030"

# Browser preview theme.
# Accepted values: "light" | "dark"
theme = "light"

[term]
# Terminal rendering theme.
# Accepted values: glow | mono | catputtin | dracura | solarized | nord | ayu
theme = "solarized"

# Pager command used to display the terminal preview.
# Set to an empty string "" to disable paging and write directly to stdout.
pager = "less -R"

[llm]
enabled = true
strategy = "llm_first"
confidence_threshold = 0.6

# LLM backend to drive when the LLM is used:
#   "anthropic_api" - call the Anthropic API over HTTP. Requires building with
#   "claude_code"   - shell out to the `claude` CLI (Claude Code). No extra
#   "codex"         - shell out to the `codex` CLI (OpenAI Codex). No extra
# provider = "anthropic_api"
provider = "claude_code"

# Model id passed to the backend (backend-specific). Omit for the backend's
# default. Examples:
#   anthropic_api: "claude-sonnet-5", "claude-opus-4-8"
#   claude_code:   "claude-sonnet-5"   (passed as `claude --model`)
#   codex:         "gpt-5-codex"        (passed as `codex --model`)
model = "claude-sonnet-5"

# Reasoning effort: "low" | "medium" | "high". Mapped per backend:
#   codex        -> `-c model_reasoning_effort="<effort>"`
#   claude_code  -> thinking keyword appended to the prompt (medium=think,
#                   high=ultrathink; low adds nothing)
#   anthropic_api-> `output_config.effort` on the Messages API (needs a model
#                   that supports effort, e.g. sonnet/opus — not Haiku 4.5)
effort = "medium"
