############### Key-Bind #################
# Prefix(Ctrl-b -> Ctrl-a)
set -g prefix C-a
unbind C-b

# Pane Split
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Pane Move
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane Swap
bind -r < swap-pane -U -d
bind -r > swap-pane -D -d

# Windows Move
unbind p
bind p previous-window
bind n next-window

# Copy Mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Change Session
# bind SPACE choose-sessio
bind o run-shell "tmux popup -w90% -h90% -E tmux-deck -i 100"

############### Look and Feel #################
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Color
set-option -g default-terminal "tmux-256color"
# set-option -ga terminal-overrides ",$TERM:Tc"
set-option -ga terminal-overrides ",$TERM:RGB"

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Check if we are in WSL
if-shell 'test -n "$WSL_DISTRO_NAME"' {
  set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colours - needs tmux-3.0 (wsl2 in Windows Terminal)
}

# Statusline
set-option -g status-interval 1
set-option -g status-position top

############### Misc #################
# Mouse wheel
# set-option -g mouse on
# set-option -g terminal-overrides 'xterm*:smcup@:rmcup@'
set escape-time 5


############### Plugins #################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'takeshid/tmux2k'

############### tmux-continuum, tmux-resurrect ###############
set -g @continuum-restore 'on'

################# tmux-2k #################
# use a theme
set -g @tmux2k-theme 'default'

# to show icons only
set -g @tmux2k-icons-only true
# to not show powerline
set -g @tmux2k-show-powerline true

# to set powerline symbols
# set -g @tmux2k-window-list-right-sep  # alternate right status bar sep
# set -g @tmux2k-window-list-right-sep  # alternate window list right sep

# set session icon, accepts: `session`, `window`, or any string
set -g @tmux2k-session-icon " " # `#W` for window name

# Define multiple groups
set -g @tmux2k-left-plugins "session cpu ram"
set -g @tmux2k-right-plugins "battery network bandwidth time"

############## TMP Run ##############
run '~/.tmux/plugins/tpm/tpm'
